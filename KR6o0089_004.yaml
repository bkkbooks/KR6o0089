body:
  text: 皇宋光嚴無際大師普觀述二不覺本上顯過門三初根本無明住地門二眷屬無明住地門三無明得有決疑門前中二初結前生後二唱本作釋二初唱本二作釋二初分門二初門下釋相二初異説相應契當門二初標徵二答釋二初總明六種三初總標示二初偈頌答二長行釋中初標徵釋頌初三句次列示釋頌中二句後指體釋頌後三句如是六種不離一心故論説言據體無別二明無下別解釋六初明無明二初寄問徵起二作答釋成二初結頌準下引經無明二字皆具五義今此頌文各去餘三略存二義言雖總舉無明之名而意別屬慧明之義二散文二初釋頌中初釋上二句次是故下釋下二句圓滿般若之日謂即明無明體始本無二滿淨覺智體絶迷暗圓照諸法無所不明故曰無明二光明下引經二初身子問中初敘所聞次若如下伸疑意二於是下如來答二初遮妄疑中初立前義正次汝智下呵彼智劣二而此下陳正理中初總標義圓次所謂下別釋義相各五義中前四是別後一為總貫通上四謂究竟無餘故乃至平等無餘故通達無礙故乃至現前無礙故由此義故名明無明如涅槃經第十五云佛告迦葉善男子如來世尊有大方便無常説常常説無常説樂為苦説苦為樂乃至無明説明明説無明等如來以是無量方便為調衆生豈虗妄耶彼經亦説名言於法無局定相故諸名字能攝一切無邊義海二暗無明二初問起二答釋二初偈頌二長行二初釋義中初釋法後釋喻二圓滿下引經三智謂即聞思修慧是其所覆總持慧明或即加行根本後得生法俱空隨應皆得唯聞思修義最親當三俱是無明二初問起二答釋二初偈頌二長行二初釋義中有法喻合喻中迦羅鳩奢那者此云眼赤鳥謂即獯猴本兔之類此等有情別業所感於諸暗色而見明曜二密嚴下引經唯一無明具二種事以隨幻德人差別故而言質者謂即主義或是體義四俱非無明二初問起二答釋二初偈頌二長行二初釋義謂體明深沈不可名狀詮緣雙離故曰俱非二八勝下引經中有六重問答於中前四謂非是彼有無俱非四句法故第五問者意云無明非彼四句即用彼非便是無明等云非非上言非者謂即不也不用彼非而作無明第六問答釋成上文雙非之意由其無有可明之事故名無明謂若定有定無定是定非則有有無等事可明今既無有有無等事之可明故詮緣俱離名曰俱非然斯經意不唯離其言了抑亦泯絶是非故俱非名通乎三義一謂雙離心言二離有無是非三謂翻前俱是雖就顯文唯彰前二據其義意應兼後一五空無明二初問起二答釋二初偈頌二長行二初釋義二無始下引經遍計所執性者謂由無明本性空無妄情謂有雖無自性然力能為諸妄根本如蠅蛇杌鬼雖無體用能令衆生驚怖而走或失命等妄情謂有蛇鬼元空六具足無明二初問起二答釋二初偈頌二長行二初釋義謂此無明體唯是染能為一切染淨之因立名具足故不同前俱是為明彼説即體俱通德幻故名俱是二佛性下引經從無明等者謂由無明於其生涅妄生欣厭因是發起大菩提心此心為質漸圓萬行而至果海推其因本並是無明故云具足三如是下指論文二初寶册已明謂於覺義不覺義等文中分明顯了説故二安立下花文且略本論安立既乃文明由是末論不煩配屬二且暗下別開十種二初問起二答釋二初偈頌答二長行釋二初明義用差別二初總明中初標十種名字釋頌前九句次明體一用殊釋頌後三句然立十名毗依六義一依對治即見一及觀滿見一依所證標名觀滿從能治立號二依因義報恩住地作無為因具大恩故三依時分無始有終謂本具名無始當斷言有終四依生持無等等生生得子藏前二生長總別成異唯生生相通生諸法是二別故子藏能持隱顯子等五依迷覆即智礙不覺不覺通迷諸法智礙別障慧明六依能緣覺了住地唯大覺者緣於無明能窮了故又無等等生生得智礙不覺子藏五種望於下轉有力見一觀滿對於上轉無力位立報恩有終覺了三種通依上下有無力用無明義用理實有多且依契經略分十種二見一下別釋十初見一虗住地二初問起二答釋二初偈頌見謂照見即能緣慧一處即是所證法界諸功德法安立依止一心處故能見之一處一處之能見所見即一處屬聲業聲二名異故今此無明從處立號謂見一處之住地故二長行二初釋義次引經下九住地準此科節然楞伽中一切三界分別煩惱入見道時一時頓斷名見一處彼説三乘最初斷者此依如來不共對治最後斷説二報恩無盡住地二初問起二答釋二初偈頌恩即住地無為因故報即無盡答無窮故或報無盡之恩住地屬主釋故或無盡即住地恩無邊故二長行二釋義引經三無始有終住地二初問起二答釋二初偈頌二長行中然由始覺依緣顯故説名有始會同本覺故言無終妄無妄源名為無始佛果無念故曰有終無始有終即住地故持業釋也四無等等生住地二初問起二答釋二初偈頌二長行二初釋義無等言其體勝等生顯其用均以能均等出生諸染故無等即等生體持用故又無等即是所生諸惑數過恆沙無與等故一時出現故曰等生無等之等生屬主義故又亦無等亦等生二用俱故次引經中謂於欲界第六天中別有殊勝宮殿園苑天魔波旬所受報處對於天衆最勝無匹無明於惑獨勝亦爾故以為喻五生得住地二初問起二答釋答中偈散釋引如前隨業俱相名三種生謂由此三最初生故得成立義無明於彼善成立故生之得故名為生得雖與本覺併力而起無明力勝獨得其名取其初生鄰近立故説言生得據子等者經揀名濫恐其有濫自體創起名為生得今此不然據果生起説名生得言子子者所生果法待能生父立以子名三相不一故云子子六觀滿住地觀字平呼謂即待義伺待始覺圓滿位中而永斷故所觀即滿故名觀滿七智礙住地謂依障用以立其名智之礙故此雖通障一切聖智然於後得相違重故八不覺住地引經般若無知等者謂無動搖情謂之知故言無知夫有所知則有所不知是以聖心無知故無所不知不知之知乃曰無知諸戲論識是知無者諸識戲論唯是妄念無彼離念真實知故九覺了住地謂此體性微細甚深而能遍緣一切因果作其境界此遍緣用唯佛窮了餘皆不知從彼能緣以彰自號故説名為覺了住地十子藏住地子謂所持一切果種即上煩惱待於能生并對所生立以子稱謂即果子種子別故今此無明能攝持故説名為藏子之藏故屬主為名譬如諸種持隱顯子其隱顯者猶生熟也世間之種所持果子有即時便能生於果者有經久方能生於果者無明亦爾所持之子被潤已熟近能生果未潤猶生去果尚遠又所持之染具於種現如其次第名隱顯子如天網者諸天所有幢蓋宮殿咸以網覆令無損失持種不失義亦如是又所持子子種種差別猶如網孔數無量故二何因下釋住地名字二初徵起二答釋二初偈頌二長行二初釋義四重擔者擔謂負也即擔住也次引經中於有愛數四住地者一欲愛住地二色愛住地三有愛住地如次三界俱生之惑四見一處住地即是三界分別之惑如次合上海山木人如是四種咸依無明故云住地二已説下隨次別釋散説門二初結指二所言下牒釋二初粗述二相二初標示次下解釋根本則廣眷屬則略故勸應觀二謂不下釋成二初廣釋根本二初總標二根本下別釋四初問答因起中初問次答而有兩重二言不下徵釋行相二初二字顯能迷二云何下三法顯所迷中初標名次實知下出體實知真如即能入門由斯理智入本法故一心法者即所入法是彼理智通所依故於中法字目一心者別得總名謂由一心即法界故三於此下結因合本於此等者則顯無明迷覆行相由迷實知一切覺故妄認動亂戲論分別由迷真如平等理故橫計虗妄染幻境界由迷一心法界體故妄取緣慮起滅之心以其不能稱順於此實知等故云不如等四彼三下別釋一義如是三法恆守一味中實之性更互相依不相捨離猶鏡三事非一異故一心如鏡體真如如鏡淨實知如照用以此三法屬當三德實知即般若冥窮理事決斷勝故真如即解脫一如煩惱皆遠離故一心為法身無量功德所依止故二自此下略明枝末而有其念者謂即無明所生染法由本不覺迷三法故枝末妄念因此得生二自此下略辨二門初標分此中顯示根本不覺對於本覺相資而起歸者依也依止真德方成幻法即真德有力是能成故幻法無力是所成故攀者引也援引妄法方顯真覺即妄法有力真覺無力能顯所顯二相別故二歸德下釋相二初歸德成幻力無力門中初示義後合文無明無體顯幻虗妄無自起力依覺而成顯德真實有成妄力道路方域所迷之境即喻本覺能迷人心猶如不覺若準前説不如三法今此成幻但本覺者真如本覺同名示故能入不離所入法故二攀妄顯真力無力門中初示義後合文法身般若不能自顯者顯示真法無自顯之力當待不覺然後現前者顯示妄法有顯真之力喻合可解二已説下眷屬無明住地門二初結指標徵二依門唱釋二初顯示微細眷屬門二初唱本二作釋二初標門二第一下隨釋二初總標略示門二初釋此文二初法不覺三相説名本末謂由本末上下下上互相與力不相離故末承本力本受末養不覺本覺對三相末作能生因是故末相而得成立三細末相對不覺本為枝養因是故本體而得止住二譬如下喻父如無明能生起故子如三細能枝養故二若如下通餘妨二初末盡本亡徵謂若本末更互相資得成住者八地已上諸菩薩等漸除末相根本不覺失枝養力則應隨斷同妙覺耶二是事下粗斷細存答斷粗相者謂由轉現形彼生相極粗現故微細三相謂隨業俱粗相雖除細相猶在故與不覺相應不離何得妄詰同果位耶二自此下標釋俱成門二初正釋此文三初依此解釋三初業相二初示義後合本初生業相極微細故無有心境能所差別亦不可分王數主伴獨以精細動作微隱遷流義用説名為業如是業相依不覺起故曰動流祇由不覺反顯覺心本無有動業相雖細然是分段變易生死根本故由是説言動則有苦業相初果不離於彼無明初因是故説言果不離因二轉相二初示義次合本前中有三初順明依前業相轉成能見次若無下反顯此了別轉義同見分後依此下結名三現相二初示義後合本前中三段同前復增喻結依前能見現諸境界戲論即是能緣之用境界即屬所緣相分由於此中具能所故二如是下指前決擇前決擇者即黎耶中三種細相同名顯示三此中下通辨能所二根本下料揀餘義三初問答無明業識二初舉疑意中初總相徵起謂初業識能所無別而與根本無明何異次此何下別示疑意無明自體不明了性能所未分正同業識如是本末何以為別二所謂下轉徵釋二初遮妄立二初心動非無明二初縱立謂即心體最初動時説名元動名為無明今牒定云若如是者二此事下奪破今總非云此事不然以違論文三相分中説言心動即名為業則知元動非無明也二若言下念起非業識二初縱立謂即元動既非無明理應正屬業識分位今牒定云若如是者二此事下奪破云此亦不爾以較量分説言念起名為無明念起心動義一名異念起既是無明心動何屬業識則前所立義定不然二動起下顯正理中初示二文謂上心動念起之文皆就業識非彼無明論言念起名無明者義通能所次出所以云隨動者即所動也前説動是業識分位即當所動無明及業能所既殊是故本末無濫失二若爾下問答無明動起二初問謂由無明甚極微細心境主伴俱不可分如何乃能動心起念耶二此處下答二初理深難了二然依下教説強稱三業相下問答業相名字二初何因立動問既此業相能緣行相所緣境界俱不可分云何説言動名為業則應動義亦不可分何故説言隨動隨起是業識耶二此事下經説隱流答業識微細亦不可分但憑佛語而作是説若於此處妄作言説徒成華綺而非堪能決了説故二已説下顯示粗重眷屬門二初結前生後二唱本作釋二初唱本二作釋二初依經辨相二初標指皆意識地者意及意識同名表示由彼末那即是意識微細分位無別體故二此決下釋成二初依分流釋相二初寄問生起謂本論中依於現相起後六粗百本經中當依何經作此釋耶謂楞伽經彼經説相當如何耶二譬如下引教證成二初引文中偈頌總有二十六句初八句中舉喻顯法明依本起末次青赤下三句頌文約境明心示六塵風相三日月下有五句頌復陳二喻辨釋同異四譬如下有八句頌如水作波本非內外後有二句明相無相攝歸真俗如其次第論文自釋二依此下示義二初總示謂本論師依此經文説從現識生起六粗二今此下別釋五初通顯因緣二初釋義然準經文法喻對説論取本義直就法明以喻對法各具四事喻中四者一所依海二能激風三所成波四相續時此唯屬海非令風浪亦無斷絶又諸轉識緣恆具故無斷絶時法中四者一現鏡識深廣如海二六塵境飄激如風三前七識動轉如波四常住時現鏡識海作用無替説名常住如海發浪恆無斷故七種轉識者其文猶倒應云識轉現識具兼能緣所緣其能緣體轉成六相親故名因猶如海水親變波故其所緣相為境牽生六粗動識疏故名緣如風激水始成波故二如經下配經喻四法四在文可知言溟壑者鵬溟鯤壑海之異名此表海是大身魚鳥翔宅之所今取溟壑為風所激鼓湧洪波相續無間又亦不唯風能激水既成波浪即互相激如諸粗識對境興盛互相增益展轉不斷故二云何下別明境界二初釋義四初徵釋境界中初徵次謂青下釋翻譯回文有所未盡故於六塵有少不次木羅應是石蜜之類西方多以香油石蜜和合成膏用塗身等華果即是意識所緣法塵之境華喻於因能生果故理實法境具通諸法今言因果令諸有情生欣厭故亦可舉此影示餘故二今此下影顯諸識今此正顯所生諸識文中但舉六塵境界影取諸識無所遺故兼令了知風相狀故釋師勸審其在于茲二彼末下會攝末那六種粗相具該七識今説六塵將非缺略然由意識有其粗細細即末那既無別體是故意識其攝末那四如是下合屬法喻六塵能動現鏡心體令起識浪故喻如風二如經下配經三如是下釋其同異二初依義解釋中初問次非同下答中三初法次喻後合現鏡藏識為能生因前七種識是所生果如是因果日光水波相似法故非同非異二如經下舉經印成四如是下辨於生處二初依義解釋中初問次如是下答如是七識依於現識衆緣和合而得顯現不可説言諸識生時而於內根及與外境根境中間三處而起唯現鏡識隨緣轉變而成七種如水作波而非內外及與中間之所起故二如經下舉經印成中頌文八句初六句正明藏識變成七識非同非異後二句亦明一識具多種用謂但一識能緣諸相見青赤等説名眼識聞玤珂等説為耳識如是乃至緣華果等説名意識故七化經説唯一識能作七事凡夫見之謂有七事而覺者見唯有意識無餘七事今此亦爾是故説言謂以彼等五如是下明相有無二初依義解釋中初問次如是下答中初説八種心識無動無遷不可破壞是常住相次而如下遣前八種常住相故云無二相唯一相下復拂前説一相之義乃至最後重重遣拂云亦無相至於無遣方成絶迹又此經意真俗對説若在俗諦不壞其相有八差別融歸真諦則無如是差別之相故彼又云真故相無別俗故相有別二如經下舉經印成二此楞下據大本會違二初標列問起二謂一下引經釋成二初敘異説二初述廣略三初略三廣八此中經文而與宋譯文言少異義旨全同二又一下略二廣八此與元魏菩提流支大唐喜學二本皆同三又一下略四廣七此於略中增其業轉略去真識然對宋魏及與唐譯皆無此語應是經本未流于此二如是下定真偽真説應歸偽説當捨二今當下伸會通二初標示勸觀謂由此經總有三本於中廣本或在龍宮及于闐等次本有三萬六千頌現傳西土略本四千頌遍在諸華所引三經對于此論則前二經缺其業轉及與末那第三一經亦缺末那馬鳴大士依經作論經既無文何得於中增其法數由此疑故下廣會釋今且總指謂前三經分流別行其中義門不出大本故此總會令無違背二初契下正伸會釋三初會初經二初略三識二初明所具將會所缺先明所具令知體性然後會釋第一真識即唵摩羅本覺為體第二現識謂藏識海隨彼風緣起諸識浪第三事識唯是意識粗分所攝以其細分屬末那故二何故下會所缺二初三識文略問二即有下二門義具答二初標列二初門下釋成二初舉兩顯三備數門謂初經中雖但標舉現事兩識然亦影兼顯示業轉末那三識謂舉粗現識當知必顯微細業轉現識屬果業轉為因既明後果定有前因舉強意識粗動功能必示末那微劣體性粗細雙取緣境方周經論互明故無所缺二後門下率上達下備數門即用前後兩節經文三細六粗名義方足率猶取也達者及也謂取上文所説三相及下文中略三種識如是上下所説三細六粗名數義方周備故經與論無所缺失然準宋魏及唐所譯上節經文所説三識義旨皆同但魏本中説末那識名為智相二此契下廣八識二中契下會中經二初明略二識二初配屬現事二義如下指會同異二初指同義如前説者謂應如前亦開二門會其所缺業轉末那由義同前故但例指二同説下會異謂會末那二經名異由末那識與慧數俱而能決斷分別境界故名智相由執所緣為真實相故名真相名雖有別體無異故二此中下指廣八識三後契下會後經二初指略四識此經三細文義自備唯事識中應該粗細故亦引會令無違反二言七下明廣七識二初釋前經謂即現識并前六識共有七種由彼末那及與意識粗細雖殊但是一故二法界下會餘教二初粗細二種同別二初引違文彼説六識緣境時中不能自轉必依第七為所依根方起取境既此意識對彼末那能依所依根識定異何得説言總為一識二經意下伸會釋謂彼法輪建立意識及與末那各別有種故説意識依於末那方得生起今楞伽中意識末那同一種類故無別體由是相合但成七識則知二經各據一理是故所説不相違背二以何下粗識所依根異二初難依末那謂今楞伽經中但説廣有七識論主依何得知第六分別事識取境時中不依末那而得生起令同種耶二楞伽下答依現識二初分流經二初標徵引釋中初經二識因緣義等名無差別迭互為因而得生起次經二識壞不壞者謂若此一根境壞亂不現前時彼一亦爾又若彼一根境不壞得現前時此一亦爾由壞不壞安危等故展轉為因而得生起二由此下結依現轉由此二文得知意識但以現識為依而起不依末那由與末那粗細雖別同一種故是故相合唯有七識二復次下大本經三初引經通辨二識中初妙嚴請問次佛言下如來為説能緣現識自體變成親故名因所緣六塵作境牽發疏故名緣是故當知粗細意識由此因緣得相續轉二以此下隨難別釋末那此對天親護法等師説第七識一向內緣第八見分不緣餘法今佛親宣六塵為緣則知末那通緣諸境由經中説境風識浪其境界風即六塵也是故第七遍緣內外為其境界理固無惑三復次下固遮外人謬解恐執法輪別種之義強會楞伽所説現識即是末那其言無準謂由楞伽大經雙顯粗細二識現鏡為因若以末那為現識者豈其細識異末那耶問上引三本分流楞伽所説識數開合不同還依自經率上達下會釋無違何故説依十萬六千大本經耶答雖取自經之文依憑大本之意以分流別部不出大本故二已説下牒論開章二初結指分門二以有下隨門牒釋二初總標略示門二初釋此文謂本論説一意識中六種粗相皆依現鏡因緣和合而得相續具足方轉二若爾下通餘妨二初散言徵釋其因此由本論文言少缺謂但説其境界為緣而不説彼識體為因是故釋師復加會釋以其因親義相顯著言雖不足理應具有二若爾下依量徵釋所依三初立量徵由前所説現識為依意識得轉濫同末那故設立敵以盡玄理謂現識是前陳有法即應末那後陳宗法前陳後説互相差別合以為宗彼由未解次陳因喻得成宗果因云為彼意識親所依故同喻猶如意根謂為意識親所依者皆是末那猶如意根故二解釋下顯過答此於前量出二種過一者遮意出違教過謂有聖教遮彼現識及與末那不令同種今此比量違自所宗何所承稟非真能立二者許意顯相符過聖教已許現識末那同一種故立量本欲違他今此既無所競枉費其功故非能立或即遮許總為一意但出相符行相可了又此兩段論文但是散言徵釋二經本同一味不假自他立破三如是下指下説黎耶末那同別等義下論決擇理致可了二自此下標釋俱成門三初二執因果則將六相勒成三類法執人執業因苦果二復次下三斷前後此明六相斷之位次其粗重者障智力強隨位先斷不遮微細後後位除今約多分作如是説三復次下五重粗細初法執名細餘皆是粗二法執之中俱生名細餘總成粗三在因名細成果為粗四對於三細六種皆粗五由此六相緣生無性粗細俱離如是諸法戲論不實無有定相但由相待權宜建立是故粗細差別無定三已説下無明得有決疑門二初結前生後二唱本作釋二初唱本論二作釋文二初標門二初門下釋相二初直示得有門二初散徵頌答頌中上半舉喻下半明法通目一切枝末不覺名上煩惱謂此煩惱迷勝德生功德之上所起煩惱故勝鬘説上煩惱者觀上煩惱禪上煩惱正受上煩惱方便上煩惱智上煩惱果上煩惱乃至如是過恆河沙等上煩惱皆依無明住地之所建立二論日下解義合本中初解頌文法喻相對以果比因當知無明決定是有由見所生染果法故次如本下合本論二後門下釋相決疑門二初解義四初一能生多問謂疑無明唯一所生染法而有無量豈可一因生多果耶二若決下依喻顯功答復將前頌法喻對顯如一種子功力勝故生多果實無明亦爾業用勝故能生一切煩惱果報三以何下染皆無明問四由彼下以果比因答以其所生一切煩惱皆是漠冥不覺相故二如本下合本三從上下覺與不覺同異門二初結指標徵言本上者雙結前説根本枝末二種無明自下蘊聚有為無為染淨相對有同有異此由本師彰表顯示造論真實根本意趣故有此文二唱本作釋二初唱本論然此一唱釋師但以同異二門判説大略今於本文復加委釋初總標二言同下別釋二初同相中三初喻明謂諸瓦器行列雖異皆同微塵為其性相瓦器離塵不可得故二如是下法説無漏即是四種無為無明即目五種有為如是染淨種種業用相待顯示皆非實有故名業幻皆悉同以絶待真如為其性相三是故下引證中二初證前義一切衆生本入涅槃即真如門唯有清淨解脫者故一切衆生即寂滅相不復更滅非可修者以相本自盡非是了因修所顯也非可作者以性本自顯非是生因所作起也既非修作何得之有良以菩提本具情求則永失其門生死本空念棄則長遭所縛苟能亡懷則道現離病則真全不假劬勞肯綮修證二亦無下通餘妨謂有疑云菩提之法非可修作畢竟無得何故諸佛現不思議微妙相身令其根熟應可見者而得見之如是色相豈非修作而感得耶故此釋云菩提之法亦無本有色相可見而有衆生見佛色相唯是隨自雜染業用幻化所作非菩提智本有色相名不空性所以者何以其智相無可見故二異相中依生滅門真妄對立無漏本真由隨染緣故成差別無明本妄自性是染而成差別二作釋文二初標門二為明下釋相三初明建立初同相門即約體絶相義次異相門即隨緣起滅義二如是下示依憑二初寄問生起二佛問下引教釋成二初同相門二初經依性演二初亡粗見細所引經文佛對文殊三番問答問異答同如是展轉至百番數文殊大士智慧觀察不見剎土瓦器地水等種種相唯見微塵二佛問下泯迹顯玄文殊以謂相本自盡妄本全真故久遠來亦不見有微塵之相由彼妄相無可見故大智度論四十七説諸凡夫人見諸微塵和合成地謂為實地餘天眼者分散此地但見微塵慧眼分別破散此地都不可得等其天眼見塵即屬前段慧眼無得義當此文如來稱善能覺一相其一相者謂即無相汝一等者恐失回文非字當在上句之前應云非唯汝一仁者如是覺了依一相門一切衆生皆悉如是所以者何一切衆生本來常住等釋其因緣餘如本論文不重出故云乃至又汝一仁者非由如是能覺了故即便得依一相法門所以者何一切衆生雖未覺了亦得依於一相法門本來常住等此中非覺及下非見有本云作文言亦顯二馬鳴下論據經弘二異相門二初經隨相演二初身子宣陳慧縛未解不能見性故與妙德所答不同二佛言下如來決斷唯汝等下準前回文妙德稱真説名為覺身子著妄故但云見二依此下論逐經弘三此二下定傍正然經所説破異歸同本論引憑二門峙立釋師表示論主本意宗於初門無違經旨以此正宗一體法故二從上下直釋生滅因緣二初結前標後此下正釋立義分中因緣二字二演義疏文二初生滅因緣義二因緣殊勝相前中二初唱本論二作釋文二初分門二初門下辨相二初攝義顯宗生解門二初六重解釋因緣義二三復遣拂因緣相前中三初初二重二初標二名三細黎耶名不相應隨緣起盡説為生滅根本無明隨緣本覺二為因緣起於三細即不相應生滅之因緣屬聲立稱前四粗相名相應生滅現鏡識體并六塵境二為因緣起前四相相應生滅之因緣亦屬主釋二初重下釋二相二初不相應生滅因緣二初散徵頌答答中初二句真妄相資明因緣體次三句因果相對顯因緣用後三句由理微隱勸令詳審二論曰下釋義指陳各各因緣二義具足者由所生法相識異故無明能作相因識緣本覺能作識因相緣故説二法各具因緣雖三細轉通具衆緣然此二法有力親勝由是説言正作因緣不遮餘法疏為緣起二次重下相應生滅因緣二初散徵頌答答中初句明因體次句明緣體後二句對於所生顯因緣義準前并釋頌文猶略應云粗生滅因緣更作意觀察應審其義理二論曰下釋義指餘識體為因塵境為緣能生三種相應染法現識體中又有緣者此明現識不但為因亦能為緣謂三相應粗動染法遍緣諸法現鏡識體亦與彼心作所緣境據牽引用復得名緣又所生三法智并不斷通於相識能生現體具含真妄如是真妄對於相識交絡相望為其因緣是故説言又有緣義此以所生例於能生作如是説若依此解論復應云六塵境中又有因義舉一兼一故論不説二復次下次二重二初標名二言本下釋相二初本遍謂無明本覺體是根本周遍能生六種粗相故二言末下末遍謂業轉二法體是枝末周遍能生三相應染故若爾何不名為相應因緣謂現鏡識望三相應鄰近親勝故得其名今業轉相隔間疏遠故不名為相應因緣雖不能生一切果法然於相應染法之中用已周遍立末遍名謂能周遍相應法故三復次下後二重二初標名二言上下釋相二初上下謂無明至果本末下種鄰次為因非隔越故然有四句一唯是因謂即無明二唯是果謂彼業繫三俱有因果中間八法四俱非因果謂即本法二言下下下上此但翻前更無別體問前能引後可得説有上下因緣後不生前何故説有下上因緣答然此十種説雖前後理實同時粗細相資方得顯現是故立有下上因緣亦可前望於後生起因緣後望於前枝養因緣父子相依方成住故如是所明六重因緣其不相應及彼本遍具該真妄合作因緣其餘四重但説妄法為因緣性又雖説妄法真覺不無具足應云本覺并現識作相應因緣本覺及業轉為末遍因緣論不言者令準知故二復次下三復遣拂因緣相如上所説六重因緣恐諸行人展轉推之反入見網故復遣拂令無所滯總有三番初以有為剎那不住即依他性無實因緣次以因緣空而無主自性無得即遍計性無實因緣後以所遣能遣皆離至於無遣即圓成實無實因緣初則由觀有為不住心絶希望成無願解脫次則空無自性成空解脫後則法不可得成無相解脫斯則一心寂寞而繁興九相騰躍而常靜真源一味緣起萬殊理趣深玄故勸思擇二已説下隨文散説決疑門二初結指標門二復次下依門解釋二初總標門二初牒指二此文下釋成二初總示二云何下別釋二初徵釋能所依所言依者即因緣義謂本覺心能與三細六粗作因緣故説名為依由此為依十一種意并其意識而得俱轉二言衆下問答衆生義二已説下廣釋門二初結指標門二此義下依門釋相二初牒指二此意下釋成二初廣大末那轉相門二分別事識轉相門前中三初能依末那行相門二相續業用差別門三唯心回轉諸法門初中二初引經明意二解義除疑前中四初引文二初寄問生起二種種下引教釋成此彰末那體用殊勝攝諸心識皆名為意心即黎耶識即前六雖有多種不離於意由此意具十一勝用粗細內外一切諸法無不作故二彼契下示義謂彼經中但舉總數不列其名今馬鳴師具足顯示令義圓故三如本下合本所依黎耶謂即本覺能依意中辨其次者先説無明染法本故次説五相由近無明暗鈍增故我來依他妄力勝故後説五識妄資真力方得轉故明暗相須不捨離故四本地下會違彼經具説十二轉者謂舉能依必有所依真妄通明故成十二此論意謂能所依異是故別開但有十一二相識下解義除疑二初隨相疏通四初相識差別二初寄問生起二謂一下依義釋成二初通明相識二初解神暗一切眷屬染法皆依本覺無明二法力起識依本覺氣分性自明了故是神解義相依無明氣分性自漠冥故是暗鈍義由真妄力殊故神暗義別二何故下明順背如是諸法雖皆名妄然對能成而有向背解了之識接本覺氣分背暗向明背本之相攬無明氣分背明向暗此則就彼顯相而言非識無暗非相無明然由真妄互為緣故二是故下別證識名經言佛性謂即本覺初問何因知有佛性次答衆生有性所以將用比體以妄顯真故説衆生皆有心識心識即是覺照用故一切衆生悉皆有心謂有心者定當作佛衆生心識即佛性故二以何下神暗皆意謂十一法皆名意者以有能生依止義故三以何下因緣親疏前不相應因緣中説無明本覺各各因緣二義具足故此徵問其次答云若望三識覺為親因無明疏緣故所生識明增暗劣若望三相無明親因覺為疏緣故所生相暗多明少中所生果神暗不同故能生法因緣各異四何故下粗細同異二初正問答二初徵釋第七前生滅中説六粗相皆意識地非餘識法彼末那識即是意識微細分位何故此文智及相續別建立為末那攝耶然為建立末那意識一體無別故此二相前屬意識此歸末那由此而知定非別體二若爾下問答第六謂若此二無別體爾則應具取六相成意何故略去後四粗分不名末那但攝智相及相續耶然其約實六相皆意雖但舉二其理已盡故引經言無所不作以顯具攝無所違矣又若末那粗細攝盡何故論者意外別開意識轉耶然為顯示能依所依法門別故粗細二識咸以本覺為所依故故末那外別示意識為能依法亦可通順法輪經中別種義故如是安立二舉此下例餘法謂有問言末那既攝三種細相何故別立三相黎耶故例指云意識為顯能所依義而別建立此亦應爾三細通依本覺心故前能起後轉為依故粗細意識依現鏡故是故三相雖末那攝為顯依義故別建立故説舉此意識決擇通達別立黎耶之義二復次下順性融拂二初示義二初拂三名謂諸教所説第八名心第七名意前六名識今則不爾由無定故皆悉互通文有數節初則自名無定謂黎耶非定黎耶等單論互通次則自他互通有二初二識互通謂藏識末那意識藏識二二相望更互通攝末那意識同體無別義已極成故論不舉後三識互通謂三種識皆名藏識等問藏識對末那末那對意識上下論文互相通攝曾無處説藏識對意識更互相攝豈三細黎耶名分別事識答由法性無定故更互通攝不可偏令黎耶意識局守自位而不相通論不説者例應知故次下復拂通名故云亦復皆非謂皆非藏識皆非末那等二如是下歸二諦中初彰俗諦謂無定即是移轉苦相無常以表遷流行相非真實故無實我相皆幻化故染妄空相如是諸識由斯等相相待無定皆俗諦攝以幻下顯真諦謂由幻空顯出真空即空解脫由性空故本來寂滅無所可取無相解脫寂滅亦寂滅常寂之相亦即不存故無所求無願解脫由三空門顯示諸識自性全真皆真諦攝二故金下引證緣生無性故曰不生由體全真故云寂滅如是總聚七五八六并業轉等九相無體故曰空無有空無有無空無有重重遣拂令無所著如是諸法心言罔及故上歎言不可思議佛言等下遮遣諸見萬有無生無相無名一切法相皆是所見一切衆生即所依身其相及身尚空無有能依之見豈得有耶謂若有見即墮邪妄經文顯證諸法真寂於所遣中具含俗諦二已説下相續業用差別門二初結前標後此但曲結隨文散説能依末那行相一門相續業用唯心回轉事識轉相三門散説次第當明學者應悉二唱本作釋二初唱本論二作釋文三初標分二初義下釋相三初攝前不失義此顯相續住持作用其能發潤即愛取等猶如於水數數溉灌過去無明所起業種令其生果由此業種熏發之後念念常興取業作用取彼當果令成熟故今得愛水溉潤攝持轉前取用成與果用與彼果力令生起故所以論言而能令作成果力用故二中義下感果成就義此相續識復能發起愛取等惑潤其果種令生現故謂時節短長受報好醜業果相稱是故論説無有差違前説潤業此明潤果由其所潤有支之內具業果故然業果種皆通三世今此所説業持過去果成現未互相顯故三後義下妄慮遍緣義謂此相續攀緣等故然猶不但住持故業成就舊報亦能發起新新過失於過現境分別違順起貪嗔等未來境中虗妄計度增其過失因茲生死流轉無窮問此相續識體是末那法執所攝何獨説其起惑潤業答然十一末那皆有此用由彼相續居末那之後接事識之初力用增強故三如是下結成二已説下唯心回轉諸法門二初結前標後二唱本作釋二初唱本論二作釋文三初解釋總標謂欲色無色總言一切如是諸法悉皆虗偽顯前末那無實體性唯由本心隨無明熏回轉顯現若離本心則無所現餘六塵境故二所以下決擇別釋二初釋唯心義二明回轉相前中二初以義徵釋三初徵釋境從心起謂心若有時有差別法心若無時無差別法此則將後心生法生心滅法滅釋成此中唯心之義二諸法下問答心相叵得不唯境界離心無得則其心法亦即無有三若爾下徵釋無亦名心謂若心法不可得爾唯心之義安得成耶故此釋云此亦心故不唯有得方曰唯心此無有義真唯心故唯識法相尚應説言若時於所緣智都無所得爾時住唯識離二取相故況法性宗豈有得耶二以何下引教證成此同宋朝求那三藏所譯經本上半頌云觀諸有為法離攀緣故緣言無心者心不見心無相可得故之心量者即此無心是心分量故二復次下明回轉相二初回轉成異二初由心回轉成空幻此中二句初論後經由經與論相符契故言大空者大品經説何等為大空東方東方相空非常非滅故何以故性自爾南西北方四維上下南西北方四維上下相空非常非滅故何以故性自爾是名大空龍勝釋意非常非滅者若人不習此空必墮二邊若常若滅所以者何若諸法實有則無滅義墮常邊中如人出一舍入一舍眼雖不見不名為無諸法亦爾從未來世入現在世從現在世入過去世若如是則常住不滅今云非常則離其過復次行入以有為患用空破有心復貴空著於空者則墮斷滅今云非滅故離此失由離二邊云非常斷斯則大品密談諸法悉入真如故皆言空此論所説三界虗偽不離真心故言無相由是論云由心不可得句成立大空之義次指經句顯示論文心不見心既此心法隨緣顯現無可見相表亦虗妄則拂歸虗幻無有真實故云由無心之心量句成立幻差別義二復次下由心回轉顯法理初則依真成妄大空義者密顯真如體絶諸相非常非滅即此所明本覺之心諸法得成謂即三界虗偽等法咸資於空體用方顯亦如埏埴為器當其無有器之用此釋本論心生法生由大空真心生成諸法故次則依妄顯真謂了幻非真空理方顯如蛇鬼既亡繩杌斯現此釋本論心滅法滅由真心不動故諸幻皆滅一味空理方得顯現二復次下相待即寂相字平呼觀謂觀行謂上所明真心妄境互相觀待而得成立由相待故一二等義悉皆無定不得成立成與不成亦即相待既無所待之成何有能待不成相觀之相本來寂故三如其下結勸令觀二已説下分別事識轉相門二初結前標後二唱本作釋二初唱本論二作釋文二初分門二揀擇下隨釋四初揀擇假者同分門三種假者其初則攝邪定聚全以彼未能生長行法故曰無根缺於大乘聞慧法眼故曰盲龍第二則攝不定聚全雖修十心進退無定如毛在道隨風飄故名曰毛頭角猶立也由其不定未立位故説名難角又角者競也與捔義同創發大心驚動魔衆與魔戰競極難進故第三則攝正定少分由三賢位生空自在分見法身德類金剛堅固不壞無退變故二生起粗重轉相門三初無根凡夫然此粗細諸染皆具但説事識由最後故二若據下毛頭凡夫此位菩薩雖覺業果定是不善起不作意於生空智猶未成熟自在根本名未現前故緣境界及身分等計我我所三若據下金剛凡夫此位菩薩雖已修鍊法空方便根本真智猶未現前故起法執攀緣思慮而障礙於平等理故三建立名字差別門二初標名二初名下釋義三初所依微細名字此從所依微細根意以立其名意之識故名為意識二中名下所依粗現名字此從所依粗著色根以彰其號謂依眼之識了別色故乃至依身之識了別觸故本唯一識分離功用各別依根各別取境分離即識體持用故分離之識根境別故三後名下隨順境界名字此但隨境以立其名此猶粗動未能真證但於事相而起分別故四顯示安立所依粗見即分別修即俱生俱生煩惱無始時來虗妄熏習內因力故恆與身俱不待邪教及邪分別任運而轉故名俱生分別煩惱內因必具亦由現在外緣力故非與身俱要待邪教及邪分別然後方起故名分別由此二惑熏於本識遂令變生分別事識即心所法助心王力令增盛故二從上下因緣殊勝相二初結前生後二唱本作釋二初唱本論二作釋文三初分門二第一下隨釋五初舉人顯示殊勝門三初標徵二一者下釋相三初分滿俱絶人凡夫二乘因分果分未修證故説名俱絶凡夫癡深二乘慧劣故於無明所起之識不能知覺二有分無滿人五十因位名之為分未證果故説名無滿從初正信即十信位發心觀察即三賢位若證法身得少分知即是初地乃至菩薩究竟地即餘諸地此上諸位雖修因分未得果滿尚有餘障故於無明所起之識不能知盡三有滿無分人證窮極果故名有滿對前有分此名無分唯佛一人鏡智遍現能窮了故三是名下結數二已説下顯示深緣決疑門二初結指分門燕本深緣誤刻為染二言常下依門釋相二初正顯二門二初常無常門自相本覺性不變故名之為常無非無常及變化故説名無常二言無下無常常門此本覺心常恆無常恆變異故名為無常無非常住及不變故説名為常前常無常即不染而染難可了知此無常常即染而不染難可了知是故名為顯示深緣二是故下總結殊勝如是因緣行相殊勝故結此義唯佛能知三自此下重釋上義此即義句不以文局從後向前而為次第所謂心性常無念故名為不變此句釋上無常常句以不達一法界故心不相應忽然念起名為無明此句釋上常無常句三已説下舉障示治配當門二初結指分門二隨轉下依門釋相二初本隨治位二初隨轉對治分位門發心為初即信成就十信唯伏故此不預其初第一執相應染剋性即當二種異相眷屬亦通業及果報不爾業果應非所斷信相應地即是三賢十種信心已成就故地論十解已去總名信行菩薩無著論中亦同此説二不斷相應染即相續相三賢折伏初地能斷三分別智相應染即是智相二地至十地得究竟離七地菩薩於無相觀仍有加行方便功用由無相觀時有出入對後八地淳無相位故稱方便又無相即是空智方便即後得智由此位中能以即空方便智發起有中殊勝行故四現色不相應染此後三種即是三細八地菩薩色相國土隨心轉變得自在故由斯自在所以現相不能為礙五能見心不相應染九地菩薩居法師位善知衆生心行稠林智見無礙故心自在能離轉相六根本業不相應染等覺菩薩金剛心中離於粗惑無垢地中一切全離由見心性到無念故二根本對治分位門大力無明粗細體用俱是能成微細之體唯佛頓斷粗著之用因位漸除三賢比觀觀察無明諸染根本摧伏其勢令漸微劣名為學斷入地已去分分漸離至妙覺果一切頓盡問無明極細云何能伏答智度論九十七説破無明者不唯一種有遮令不起名破有得諸法實相名破又此無明種數甚多有菩薩所破分有佛所破分有小菩薩所破分有大菩薩所破分由此應知大力無明通諸粗細及與伏斷二極喜下本隨治異二初直明極喜此則徵釋根隨義別謂後得智正緣事境根本無明正迷於事障治相違故後得斷其根本智正緣真理隨相染法正迷於理行相相違故正智斷二如説下指例餘地初地既爾餘地皆然雖諸地中真俗雙運障智義別亦無相濫四已説下顯應不應差別門二初結指二云何下釋相二初相應義二初體異故相應心品即是本覺之分義當心王念法則屬不覺之分義當心所如是二種各有別體心品為主能導引故念法為伴能輔翼故互相與力故曰相應二念法下相同故相應二初正問答謂有疑云念染心淨差別不同何故説言成相應義論釋謂由能知行相所緣境相二二同故名曰相應問心品念法真妄和合方得成就何故今説心品單真念法獨妄名相應耶答實由王所真妄互有今約親勝作如是説猶如識相就勝成異二云何下轉徵釋三初釋二同初智相同心念不離和會轉者即是王所行相契同謂心王心所善不善等定相隨順如是二法行相相似故名為同次緣相同所緣境界王所定同謂心王緣色等時心所決定同緣色等故二大本下引經證三種相同者謂即三種相應染法知相緣相二皆同故異故成同者謂由王所體性各異乃能成就知緣相同若體無異對何説同若同不同者反明上義謂若心念法同則不可説知緣相同成相應義又此一句雙結上義謂若知緣相同體性不同名相應故又可此句別釋三種不相應染即心不覺名為若同知相緣相無相似義名為不同由心念是一無有知緣彼此相似望誰言同若依此説則上云三種乃雙顯二三即三相應三不相應也三若爾下會違文若説此三知緣相同名相應爾何故彼經説相違轉然彼為顯三種粗染違於上轉功德妙位非是知緣二相相違二不相下不相應義但反前故曰相違略不別釋故勸審觀五已説下立二礙別障用門二初結指二彼煩下釋相三初別明障礙二初煩惱礙六種染心名煩惱礙照寂妙慧如理之智名根本智粗細染心性多散動正能障彼寂靜性故説名為礙二彼智下智礙本末無明名為智礙通達俗諦如量之智能觀諸法自相共相應根運用用常寂是故説名自然業智一切無明漠冥性故正能障彼聰明性故説名為礙今此但依本末根依而分二礙謂所起染心不分粗細一切皆屬煩惱礙攝能起無明不分枝本一切皆是智礙所攝不同諸教依人法執引生二障而為名故二此義中總示因緣此則顯示能依染心所依無明各對所障立礙名故三二障下料揀勸觀謂有疑云障礙二名以何為異故今釋云立二障者一向依彼能治聖道斷除義説由是立障皆就位説謂信相應地離淨心地離乃至如來地離立二礙者通乎二義謂斷不斷言不斷者據其生法之作用故由煩惱礙違平等性能生一切不平等法由智慧礙違明利性能生一切溟冥之法是故二礙多不明其斷之位次良以諸教具含二義謂生法次第對治次第二障唯局後一二礙亦通前義由是障礙無相濫失又法相宗説二障者唯是妄染決定可斷今法性宗建立二礙妄即真故非定可斷故障與礙各別建立三從上下通結論第四畢
